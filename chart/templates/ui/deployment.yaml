apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: {{ .Values.ui.namespace }}
  labels:
    app: ui
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: '{{ .Values.ui.uiImage }}:{{ .Values.ui.uiTag }}'
          env:
            - name: HOSTNAME
              value: "0.0.0.0" 
            - name: PORT
              value: "3000"
