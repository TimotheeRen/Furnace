apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: get-secrets
  namespace: default
subjects:
  - kind: ServiceAccount
    name: server-account
    namespace: default
roleRef:
  kind: Role
  name: secret-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: edit-servers
  namespace: servers
subjects:
  - kind: ServiceAccount
    name: server-account
    namespace: default
roleRef:
  kind: Role
  name: server-role
  apiGroup: rbac.authorization.k8s.io
